<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Purva! 🎉</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #b39ddb;
            --primary-light: #e6ceff;
            --secondary: #80deea;
            --text: #4a4a4a;
            --bg: #f3e5f5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            padding-bottom: 70px;
        }

        h1, h2, h3 {
            font-family: 'Fredoka One', cursive;
            color: #6a1b9a;
        }

        /* --- Music Controller --- */
        .music-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .music-bar:hover { transform: scale(1.05); }
        .music-bar i { color: #ff4081; font-size: 1.2rem; }

        /* --- Navigation --- */
        .navbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.8rem;
            color: #888;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            font-weight: 700;
        }
        .nav-item i { font-size: 1.3rem; margin-bottom: 4px; }
        .nav-item.active { color: #6a1b9a; transform: translateY(-5px); }

        /* --- Confetti Effect --- */
        .confetti-container {
            position: fixed;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999;
            top: 0; left: 0;
        }
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ff0;
            animation: fall 4s linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); top: 0; }
            100% { transform: translateY(100vh) rotate(360deg); top: 100%; }
        }

        /* --- Page Layouts --- */
        .page {
            display: none;
            min-height: 100vh;
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease-in-out;
        }
        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Home Page (Hero) --- */
        #home {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .hero-img-wrapper {
            position: relative;
            width: 280px;
            height: 350px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            margin-bottom: 25px;
            border: 8px solid white;
        }
        .hero-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .birthday-title {
            font-size: 2.2rem;
            margin-bottom: 10px;
            line-height: 1.2;
        }
        .sub-message {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 20px;
        }

        /* --- Memories Page (Polaroids) --- */
        .memories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        .polaroid {
            background: white;
            padding: 15px 15px 25px 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            transform: rotate(-2deg);
            transition: 0.3s;
        }
        .polaroid:nth-child(even) { transform: rotate(3deg); }
        .polaroid:hover { transform: rotate(0deg) scale(1.05); z-index: 10; }
        .polaroid img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border: 1px solid #ddd;
        }
        .polaroid .caption {
            text-align: center;
            font-family: 'Fredoka One', cursive;
            margin-top: 15px;
            color: #555;
            font-size: 1rem;
        }

        /* --- Wishes Page (Cards) --- */
        .wishes-container { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; }
        .wish-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-left: 5px solid var(--primary);
            position: relative;
        }
        .wish-card i.quote {
            position: absolute;
            right: 20px; top: 15px;
            font-size: 2rem;
            color: #f3e5f5;
        }
        .message-form {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-top: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .message-form input, .message-form textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid var(--primary-light);
            border-radius: 8px;
            font-family: inherit;
        }
        .btn {
            background: var(--primary);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { background: #9575cd; }

        /* --- Games Page --- */
        .game-box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 100%;
            gap: 10px;
            margin-top: 15px;
        }
        .option-btn {
            background: #f5f5f5;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .option-btn:hover { background: var(--primary-light); }
        
        /* Scratch Card */
        .scratch-container {
            position: relative;
            width: 260px;
            height: 150px;
            margin: 20px auto;
            user-select: none;
        }
        .scratch-reveal {
            position: absolute;
            width: 100%; height: 100%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fredoka One', cursive;
            font-size: 1.2rem;
            color: #ff4081;
            border-radius: 10px;
            border: 2px dashed #b39ddb;
        }
        .scratch-canvas {
            position: absolute;
            top: 0; left: 0;
            cursor: crosshair;
            border-radius: 10px;
        }

        /* --- Gallery Page --- */
        .gallery-masonry {
            columns: 2;
            column-gap: 15px;
            margin-top: 20px;
        }
        .gallery-item {
            background: white;
            margin-bottom: 15px;
            break-inside: avoid;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 4px solid white;
        }
        .gallery-item img { width: 100%; display: block; height: auto; }

        @media(max-width: 600px) {
            .gallery-masonry { columns: 1; }
            .birthday-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    <div class="music-bar" onclick="toggleMusic()">
        <i class="fas fa-music" id="music-icon"></i>
        <span id="music-status">Play Music 🎵</span>
    </div>

    <div class="confetti-container" id="confetti"></div>

    <section id="home" class="page active">
        <div class="hero-img-wrapper">
            <img src="purva-cake.jpg" alt="Purva Rajvir">
        </div>
        <h1 class="birthday-title">Happy Birthday, Purva Rajvir! 🎂</h1>
        <p class="sub-message">To my absolute best friend in the whole universe. Today is all about celebrating you!</p>
        <button class="btn" onclick="switchPage('memories')">Let's Look Back ✨</button>
    </section>

    <section id="memories" class="page">
        <h2 style="text-align: center;">Our Precious Memories 📸</h2>
        <p style="text-align: center; color: #777;">A snapshot of the amazing times we've shared together.</p>
        
        <div class="memories-grid">
            <div class="polaroid">
                <img src="sydney-denim.jpg" alt="Denim Duo">
                <div class="caption">The Denim Duo 💙</div>
            </div>
            <div class="polaroid">
                <img src="sydney-city.jpg" alt="Sydney Adventures">
                <div class="caption">Exploring in Style 🌆</div>
            </div>
            <div class="polaroid">
                <img src="dinner-tales.jpg" alt="Taste & Tales">
                <div class="caption">Taste & Tales Nights ✨</div>
            </div>
        </div>
    </section>
